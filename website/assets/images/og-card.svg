<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Inter:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1A1A1C"/>

  <!-- Subtle grid texture -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Glow accent — top left -->
  <radialGradient id="glow1" cx="0%" cy="0%" r="60%">
    <stop offset="0%" stop-color="#D8F552" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#1A1A1C" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow1)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- IO monogram box -->
  <rect x="80" y="80" width="56" height="56" rx="10" fill="#232326" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="108" y="120" text-anchor="middle" font-family="serif" font-size="26" font-weight="900" fill="#F2F2F2" letter-spacing="-1">IO</text>

  <!-- Availability pill -->
  <rect x="80" y="168" width="230" height="28" rx="14" fill="rgba(216,245,82,0.1)" stroke="rgba(216,245,82,0.2)" stroke-width="1"/>
  <circle cx="100" cy="182" r="4" fill="#D8F552"/>
  <text x="114" y="187" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#D8F552" letter-spacing="0.08em" text-transform="uppercase">AVAILABLE FOR WORK</text>

  <!-- Main headline -->
  <text x="80" y="310" font-family="'Archivo Black', serif" font-size="72" fill="#F2F2F2" letter-spacing="-2">Designing systems</text>
  <text x="80" y="398" font-family="'Archivo Black', serif" font-size="72" fill="#F2F2F2" letter-spacing="-2">that work.</text>

  <!-- Sub copy -->
  <text x="80" y="458" font-family="Inter, sans-serif" font-size="20" fill="#888888">Senior Product &amp; Service Designer · 13+ years · Paystack · Stripe</text>

  <!-- Divider -->
  <line x1="80" y1="510" x2="320" y2="510" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Bottom meta -->
  <text x="80" y="540" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#555555" letter-spacing="0.06em">ITA OKPONUNG</text>
  <text x="80" y="562" font-family="Inter, sans-serif" font-size="13" fill="#333333">paper-ita-design-profile.vercel.app</text>

  <!-- Right decorative element — mini dashboard mockup -->
  <rect x="780" y="120" width="340" height="220" rx="12" fill="#232326" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- window chrome -->
  <rect x="780" y="120" width="340" height="32" rx="12" fill="#2C2C30"/>
  <rect x="780" y="140" width="340" height="12" fill="#2C2C30"/>
  <circle cx="804" cy="136" r="5" fill="#FF5F57"/>
  <circle cx="820" cy="136" r="5" fill="#FFBD2E"/>
  <circle cx="836" cy="136" r="5" fill="#28CA41"/>
  <!-- chart bars -->
  <rect x="808" y="198" width="20" height="30" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="836" y="182" width="20" height="46" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="864" y="192" width="20" height="36" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="892" y="170" width="20" height="58" rx="3" fill="#D8F552" opacity="0.8"/>
  <rect x="920" y="186" width="20" height="42" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="948" y="176" width="20" height="52" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="976" y="202" width="20" height="26" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="1004" y="188" width="20" height="40" rx="3" fill="rgba(255,255,255,0.1)"/>
  <!-- data rows -->
  <circle cx="808" cy="264" r="4" fill="#22D3A0"/>
  <rect x="820" y="261" width="120" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="956" y="261" width="40" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <circle cx="808" cy="284" r="4" fill="#FF9F43"/>
  <rect x="820" y="281" width="86" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="956" y="281" width="30" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <circle cx="808" cy="304" r="4" fill="#FF5F57"/>
  <rect x="820" y="301" width="65" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="956" y="301" width="22" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>

  <!-- KPI card -->
  <rect x="780" y="362" width="160" height="88" rx="10" fill="#232326" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="800" y="390" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#555555" letter-spacing="0.08em">COMPLIANCE</text>
  <text x="800" y="426" font-family="'Archivo Black', serif" font-size="32" fill="#F2F2F2" letter-spacing="-1">94%</text>
  <rect x="800" y="434" width="40" height="3" rx="1" fill="#D8F552" opacity="0.7"/>

  <!-- Status card -->
  <rect x="960" y="362" width="160" height="88" rx="10" fill="#232326" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="980" y="390" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#555555" letter-spacing="0.08em">STATUS</text>
  <circle cx="980" cy="416" r="5" fill="#22D3A0"/>
  <text x="994" y="421" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#F2F2F2">Compliant</text>
  <rect x="980" y="434" width="80" height="3" rx="1" fill="rgba(255,255,255,0.06)"/>
</svg>
